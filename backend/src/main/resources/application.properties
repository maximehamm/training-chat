# Server
server.port=8080

# H2 in-memory
spring.datasource.url=jdbc:h2:mem:assist;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JSON : snake_case + exclure les champs null
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null

# Claude API
anthropic.api-key=${ANTHROPIC_API_KEY:}
claude.model=${CLAUDE_MODEL:claude-sonnet-4-5-20250514}
claude.max-tokens=${CLAUDE_MAX_TOKENS:4096}
claude.temperature=${CLAUDE_TEMPERATURE:0.7}

# Assist
assist.version=1.0.0
assist.docs-path=${DOCS_PATH:./docs}
assist.test-command=${TEST_COMMAND:./gradlew test}
